name: Module CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        type: string
      source_ref:
        description: "Git ref to build from (defaults to the triggering ref)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

env:
  VOLANG_REF: 6bf8cbe3562feedfb3a67554d97745edc3e8c262

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install system deps
        run: sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout volang toolchain
        uses: actions/checkout@v6.0.2
        with:
          repository: vo-lang/volang
          ref: ${{ env.VOLANG_REF }}
          path: volang

      - name: Build vo
        run: cargo build --manifest-path volang/cmd/vo/Cargo.toml --release

      - name: Expose vo on PATH
        run: echo "$GITHUB_WORKSPACE/volang/target/release" >> "$GITHUB_PATH"

      - name: Verify release state
        run: vo release verify .

      - name: Check module
        run: vo check .

      - name: Test module
        run: |
          if [ -d tests ]; then
            vo test tests
          else
            echo "no tests directory"
          fi

  build_native_release_artifacts:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            library: libvo_voplay.dylib
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library: libvo_voplay.so
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build native extension
        run: cargo build --manifest-path rust/Cargo.toml --lib --release --target ${{ matrix.target }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.library }}

  release_assets:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs:
      - validate
      - build_native_release_artifacts
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/checkout@v6.0.2
        with:
          repository: vo-lang/volang
          ref: ${{ env.VOLANG_REF }}
          path: volang

      - uses: ./volang/.github/actions/setup-rust

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Build vo
        run: cargo build --manifest-path volang/cmd/vo/Cargo.toml --release

      - name: Expose vo on PATH
        run: echo "$GITHUB_WORKSPACE/volang/target/release" >> "$GITHUB_PATH"

      - name: Install JS dependencies
        working-directory: js
        run: npm ci

      - name: Build Studio JS assets
        working-directory: js
        run: npm run build

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Build pkg-island release assets
        working-directory: rust
        run: |
          wasm-pack build --target web --out-dir pkg-island --out-name voplay_island --release . -- --no-default-features --features wasm-island

      - name: Download staged release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ runner.temp }}/release-artifacts
          merge-multiple: true

      - name: Stage release assets
        run: |
          vo release stage . \
            --version "${{ inputs.version || github.event.release.tag_name || github.ref_name }}" \
            --artifact extension-native aarch64-apple-darwin libvo_voplay.dylib "$RUNNER_TEMP/release-artifacts/libvo_voplay.dylib" \
            --artifact extension-native x86_64-unknown-linux-gnu libvo_voplay.so "$RUNNER_TEMP/release-artifacts/libvo_voplay.so" \
            --artifact extension-js-glue wasm32-unknown-unknown voplay_island.js web-artifacts/voplay_island.js \
            --artifact extension-wasm wasm32-unknown-unknown voplay_island_bg.wasm web-artifacts/voplay_island_bg.wasm \
            --out-dir release-dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
          files: release-dist/*
