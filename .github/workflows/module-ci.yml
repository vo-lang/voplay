name: Module CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install system deps
        run: sudo apt-get install -y libasound2-dev

      - name: Install vo
        run: curl -fsSL "https://github.com/vo-lang/volang/releases/latest/download/vo-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C /usr/local/bin vo

      - name: Verify release state
        run: vo release verify .

      - name: Check module
        run: vo check .

      - name: Test module
        run: |
          if [ -d tests ]; then
            vo test tests
          else
            echo "no tests directory"
          fi

  release_assets:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: validate
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          path: volang

      - uses: ./volang/.github/actions/setup-rust

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Build pkg-island release assets
        working-directory: rust
        run: |
          wasm-pack build --target web --out-dir pkg-island --out-name voplay_island --release . -- --no-default-features --features wasm-island

      - name: Stage release assets
        working-directory: volang
        run: |
          cargo run -p vo --release -- release stage .. \
            --version "${{ inputs.version || github.event.release.tag_name || github.ref_name }}" \
            --artifact extension-wasm wasm32-unknown-unknown voplay_island_bg.wasm ../rust/pkg-island/voplay_island_bg.wasm \
            --artifact extension-js-glue wasm32-unknown-unknown voplay_island.js ../rust/pkg-island/voplay_island.js \
            --out-dir ../release-dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
          files: release-dist/*
