name: Module CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/v*"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: module-ci-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}

env:
  VOLANG_REF: 325a469316e79443274648e037ca5889bce338dc
  VOGUI_REF: 6e4be8ee1292bfbbb7684e46770c1c268a121077
  VOPACK_REF: f9c0fe4427c9598e24f2bae4418d9966b7075dbb

jobs:
  validate_workspace:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: checkouts/voplay
    steps:
      - name: Checkout voplay
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: checkouts/voplay

      - name: Checkout Volang toolchain
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: vo-lang/volang
          ref: ${{ env.VOLANG_REF }}
          path: checkouts/volang

      - name: Checkout vogui workspace dependency
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: vo-lang/vogui
          ref: ${{ env.VOGUI_REF }}
          path: checkouts/vogui

      - name: Checkout vopack workspace dependency
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: vo-lang/vopack
          ref: ${{ env.VOPACK_REF }}
          path: checkouts/vopack

      - name: Configure workspace
        working-directory: checkouts
        shell: bash
        run: |
          printf '%s\n' \
            'format = 1' \
            'members = ["vogui", "vopack", "voplay", "voplay/examples/empty_smoke", "voplay/examples/primitive_smoke", "voplay/examples/primitive_stress"]' \
            > vo.work

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.94.0"
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: checkouts/voplay/js/package-lock.json

      - name: Build the pinned Vo toolchain
        run: cargo build --locked --manifest-path ../volang/cmd/vo/Cargo.toml --release

      - name: Expose Vo on PATH
        run: echo "$GITHUB_WORKSPACE/checkouts/volang/target/release" >> "$GITHUB_PATH"

      - name: Verify all-local package authority
        shell: bash
        env:
          VOWORK: ${{ github.workspace }}/checkouts/vo.work
        run: |
          graph="$RUNNER_TEMP/voplay-module-graph.json"
          vo mod graph --json . > "$graph"
          jq -e \
            --arg work "$GITHUB_WORKSPACE/checkouts/vo.work" \
            --arg vogui "$GITHUB_WORKSPACE/checkouts/vogui" \
            --arg vopack "$GITHUB_WORKSPACE/checkouts/vopack" \
            '
              .authority == "lock"
              and .workspace.file == $work
              and (.modules | map(.module)) == [
                "github.com/vo-lang/vogui",
                "github.com/vo-lang/vopack"
              ]
              and ([.modules[].source.kind] | unique) == ["workspace"]
              and ([.modules[] | select(.module == "github.com/vo-lang/vogui") | .source.directory] == [$vogui])
              and ([.modules[] | select(.module == "github.com/vo-lang/vopack") | .source.directory] == [$vopack])
              and ([.. | objects | select(.kind? == "registry" or .kind? == "release")] | length) == 0
            ' "$graph"

      - name: Check root module
        env:
          VOWORK: ${{ github.workspace }}/checkouts/vo.work
        run: vo check .

      - name: Test root module
        env:
          VOWORK: ${{ github.workspace }}/checkouts/vo.work
        run: |
          if [[ -d tests ]]; then
            vo test tests
          fi

      - name: Check workspace examples
        shell: bash
        env:
          VOWORK: ${{ github.workspace }}/checkouts/vo.work
        run: |
          for example in empty_smoke primitive_smoke primitive_stress; do
            root="$GITHUB_WORKSPACE/checkouts/voplay/examples/$example"
            vo check "$root"
          done

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Test native renderer and physics
        run: cargo test --locked --manifest-path rust/Cargo.toml --lib

      - name: Install JS dependencies
        working-directory: checkouts/voplay/js
        run: npm ci

      - name: Check and build JS
        working-directory: checkouts/voplay/js
        run: |
          npm run check
          npm run build

      - name: Verify tracked JS outputs
        run: git diff --exit-code -- js/dist

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.14.0

      - name: Build Studio WASM parity fixture
        run: node ../volang/apps/studio/scripts/build_wasm.mjs

      - name: Verify vehicle telemetry parity
        env:
          VO_BIN: ${{ github.workspace }}/checkouts/volang/target/release/vo
          VOWORK: ${{ github.workspace }}/checkouts/vo.work
        run: node tools/check_vehicle_telemetry_parity.mjs

      - name: Verify release and exposure tooling
        run: |
          node tools/verify_github_release.mjs --self-test
          node tools/check_render_exposure.mjs --self-test

      - name: Build browser WASM from source
        env:
          VOWORK: ${{ github.workspace }}/checkouts/vo.work
        run: |
          wasm-pack build \
            --target web \
            --release \
            --out-dir "$RUNNER_TEMP/voplay-current-wasm" \
            --out-name voplay_island \
            rust \
            --no-default-features \
            --features wasm-island \
            --locked

      - name: Verify clean generated state
        run: |
          git diff --check
          git diff --exit-code

  release_unavailable:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Require registry bootstrap
        shell: bash
        run: |
          echo "::error::voplay release is unavailable until registry releases for vogui and vopack can replace the workspace lock."
          exit 1
