name: Module CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          path: module
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          path: volang

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: ./volang/.github/actions/setup-rust

      - name: Verify release state
        working-directory: volang
        run: cargo run -p vo --release -- release verify ../module

      - name: Check module
        working-directory: volang
        run: ./d.py --release check ../module

      - name: Test module
        working-directory: volang
        run: |
          if [ -d ../module/tests ]; then
            ./d.py test both --release ../module/tests
          else
            echo "no tests directory"
          fi

  release_assets:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: validate
    runs-on: ubuntu-latest
    env:
      VOWORK: off
    steps:
      - uses: actions/checkout@v4
        with:
          path: module
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          path: volang

      - uses: ./volang/.github/actions/setup-rust

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Determine release version
        id: version
        run: |
          version="${{ github.event.release.tag_name }}"
          ref_type="${{ github.ref_type }}"
          ref_name="${{ github.ref_name }}"
          if [ -z "$version" ]; then
            version="${{ inputs.version }}"
          fi
          if [ -z "$version" ] && [ "$ref_type" = "tag" ]; then
            version="$ref_name"
          fi
          if [ -z "$version" ]; then
            echo "::error::version is required for workflow_dispatch or tag push"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build pkg-island release assets
        working-directory: module/rust
        run: |
          wasm-pack build --target web --out-dir pkg-island --out-name voplay_island --release . -- --no-default-features --features wasm-island

      - name: Stage release assets
        working-directory: volang
        run: |
          cargo run -p vo --release -- release stage ../module \
            --version "${{ steps.version.outputs.value }}" \
            --artifact extension-wasm wasm32-unknown-unknown voplay_island_bg.wasm ../module/rust/pkg-island/voplay_island_bg.wasm \
            --artifact extension-js-glue wasm32-unknown-unknown voplay_island.js ../module/rust/pkg-island/voplay_island.js \
            --out-dir ../module/release-dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: module/release-dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: module/release-dist/*
